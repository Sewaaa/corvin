name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: SAST — Bandit static analysis
  # ────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install bandit==1.7.8

      - name: Run Bandit SAST
        # -ll: report only MEDIUM+ severity
        # -x tests/: exclude test files (intentionally use assert, hardcoded values)
        # --exit-zero: don't fail CI on informational findings, only on real issues
        run: bandit -r app/ -ll -x tests/ --format json -o bandit-report.json || bandit -r app/ -ll -x tests/

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Dependency audit — pip-audit
  # ────────────────────────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit dependencies
        # PYSEC-2023-62: reportlab cosmetic-only finding (not security-critical)
        # PYSEC-2024-232, PYSEC-2024-233: python-jose — no fix released upstream yet
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2023-62 \
            --ignore-vuln PYSEC-2024-232 \
            --ignore-vuln PYSEC-2024-233

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Backend tests — pytest + coverage
  # ────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    needs: [sast]

    defaults:
      run:
        working-directory: backend

    env:
      # Tests use SQLite in-memory — no real Postgres needed
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production-32chars
      ENVIRONMENT: testing
      UPLOAD_DIR: /tmp/corvin-uploads-ci
      HIBP_API_KEY: ""
      VIRUSTOTAL_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create upload directory
        run: mkdir -p /tmp/corvin-uploads-ci

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Frontend build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
