services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: corvin-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: corvin-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MFA_ISSUER
        value: Corvin
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SMTP_PORT
        value: "587"
      # Questi vanno inseriti manualmente dalla dashboard Render:
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: corvin-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --queues=breach,domain,scanner,sandbox,email,notifications,celery --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: corvin-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: corvin-api
          envVarKey: SECRET_KEY
      - key: SMTP_PORT
        value: "587"
      - key: REDIS_URL
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  - type: worker
    name: corvin-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: corvin-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: corvin-api
          envVarKey: SECRET_KEY
      - key: REDIS_URL
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: corvin-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Inserire manualmente: https://corvin-api.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false

# ── PostgreSQL Managed ───────────────────────────────────────────────────────
databases:
  - name: corvin-db
    plan: free
    databaseName: corvin
    user: corvin
